<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Niv Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: #020617;
    }

    .card {
      transition: all 0.3s ease;
    }

    .card:hover {
      transform: translateY(-6px);
      box-shadow: 0 15px 40px rgba(0,0,0,0.4);
    }

    .glow {
      box-shadow: 0 0 20px rgba(59,130,246,0.5);
    }

    .btn:active {
      transform: scale(0.95);
    }
  </style>
</head>

<body class="text-gray-200">

<!-- Layout -->
<div class="flex min-h-screen">

  <!-- Sidebar -->
  <aside class="w-20 bg-[#020617] border-r border-gray-800 flex flex-col items-center py-6 space-y-8">
    <div class="w-10 h-10 bg-blue-500 rounded-xl glow"></div>
    <div class="space-y-6 text-gray-400">
      <div>🏠</div>
      <div>📊</div>
      <div>📁</div>
      <div>⚙️</div>
    </div>
  </aside>

  <!-- Main -->
  <main class="flex-1 p-6 space-y-6">

    <!-- Profile -->
    <div class="card bg-[#0F172A] p-6 rounded-2xl flex items-center justify-between">
      <div class="flex items-center space-x-4">
        <img src="https://i.pravatar.cc/100" class="w-16 h-16 rounded-full border-2 border-blue-500">
        <div>
          <h1 class="text-xl font-semibold">Niv</h1>
          <p class="text-gray-400 text-sm">Engineering Student | AI Builder</p>
        </div>
      </div>
      <button class="btn bg-blue-500 px-4 py-2 rounded-xl hover:bg-blue-600 transition">
        Contact
      </button>
    </div>

    <!-- Stats -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">

      <div class="card bg-[#0F172A] p-4 rounded-xl text-center">
        <h2 class="text-2xl font-bold" id="projects">0</h2>
        <p class="text-gray-400">Projects</p>
      </div>

      <div class="card bg-[#0F172A] p-4 rounded-xl text-center">
        <h2 class="text-2xl font-bold" id="commits">0</h2>
        <p class="text-gray-400">Commits</p>
      </div>

      <div class="card bg-[#0F172A] p-4 rounded-xl text-center">
        <h2 class="text-2xl font-bold" id="hackathons">0</h2>
        <p class="text-gray-400">Hackathons</p>
      </div>

    </div>

    <!-- Projects -->
    <div>
      <h2 class="text-lg mb-3">Projects</h2>

      <div class="grid md:grid-cols-2 gap-4">

        <div class="card bg-[#0F172A] p-4 rounded-xl">
          <h3 class="font-semibold">FakeSpotter AI</h3>
          <p class="text-gray-400 text-sm mt-1">Detect fake profiles using AI</p>
          <button class="btn mt-3 text-blue-400">View</button>
        </div>

        <div class="card bg-[#0F172A] p-4 rounded-xl">
          <h3 class="font-semibold">Dashboard UI</h3>
          <p class="text-gray-400 text-sm mt-1">Modern profile dashboard</p>
          <button class="btn mt-3 text-blue-400">View</button>
        </div>

      </div>
    </div>

    <!-- Skills -->
    <div>
      <h2 class="text-lg mb-3">Skills</h2>

      <div class="space-y-3">

        <div>
          <p class="text-sm">Java</p>
          <div class="w-full bg-gray-800 h-2 rounded">
            <div class="bg-blue-500 h-2 rounded w-[80%]"></div>
          </div>
        </div>

        <div>
          <p class="text-sm">React</p>
          <div class="w-full bg-gray-800 h-2 rounded">
            <div class="bg-blue-500 h-2 rounded w-[70%]"></div>
          </div>
        </div>

      </div>
    </div>

  </main>

</div>

<!-- Animation Script -->
<script>
  function animateValue(id, start, end, duration) {
    let obj = document.getElementById(id);
    let range = end - start;
    let startTime = null;

    function step(timestamp) {
      if (!startTime) startTime = timestamp;
      let progress = Math.min((timestamp - startTime) / duration, 1);
      obj.innerText = Math.floor(progress * range + start);
      if (progress < 1) {
        window.requestAnimationFrame(step);
      }
    }

    window.requestAnimationFrame(step);
  }

  animateValue("projects", 0, 12, 1000);
  animateValue("commits", 0, 250, 1200);
  animateValue("hackathons", 0, 5, 900);
</script>

</body>
</html>
